<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <meta name="description" content="오늘의 플래너 — 목표 과제와 진행을 한곳에서." />
    <title>RUN DO</title>
    <link rel="stylesheet" href="./styles.css" />

  <body>
    <a class="skip-link" href="#main">본문으로 건너뛰기</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="홈으로">
          <span class="brand-mark" aria-hidden="true">DO</span>
          <span class="brand-text">RUN DO</span>
        </a>

        <nav class="nav" aria-label="주요 메뉴">
          <button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false">
            <span class="sr-only">메뉴 열기</span>
            <span aria-hidden="true">☰</span>
          </button>

          <ul class="nav-list" data-nav-list>
            <li><a class="nav-link" href="./index.html">홈</a></li>
            <li><a class="nav-link" href="./about.html">소개</a></li>
          </ul>
        </nav>

        <div class="header-actions">

        </div>
      </div>
    </header>

    <main id="main">
      <section class="hero hero-home" aria-label="시작">
        <div class="container hero-home-inner">
          <div class="hero-planner">
            <p class="hero-planner-label">오늘의 플래너</p>
            <a
              class="btn btn-primary"
              href="./login.html"
              data-start-link
              data-href-guest="./login.html"
              data-href-auth="./planner.html"
              >시작하기</a>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="muted small">
          © <span data-year></span> 오픈소스SW 1조 RUN DO 프로젝트
        </p>
        <div class="footer-links">
          <a class="muted small" href="./about.html">소개</a>
        </div>
      </div>
    </footer>

    <script src="./main.js" defer></script>
